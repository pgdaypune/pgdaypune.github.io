      ### The Journey of VACUUM: From Dead Tuples to REPACK CONCURRENTLY
      **`Speaker:`** [Jeevan Chalke](/speakers/jeevan-chalke)
      <details>
        <summary>Talk Details</summary>
        In his talk, Jeevan will trace the evolution of PostgreSQL bloat management from traditional autovacuum to the new native REPACK CONCURRENTLY command in PostgreSQL 19. He will break down how this extensionless, near-zero-downtime tool works under the hood and provide practical guidance for managing table bloat safely in production.
      </details>

      ![Jeevan Chalke](/images/speakers/jeevan-chalke.jpeg)
