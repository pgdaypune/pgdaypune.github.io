      ### Upgrade Yourself: The Self-Image Operating System (Softskills track)
      **`Speaker:`** [Mohini Ogale](/speakers/mohini-ogale)
      <details>
        <summary>Talk Details</summary>
        In this talk, Mohini unpacks the real source of first impressions — Self‑image. She explains what “image” truly means, how self‑image is formed, and why it matters more than outer polish. Through stories, reflection, and practical steps, she shows how to develop a positive self‑image that builds confidence, authority, and lasting impact in client conversations and career growth.
      </details>

