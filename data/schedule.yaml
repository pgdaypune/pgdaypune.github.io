      ### Zero-Downtime Schema Changes: From Lock Hell to Live Migrations
      **`Speaker:`** [Ayush Shah](/speakers/ayush-shah)
      <details>
        <summary>Talk Details</summary>
        In his talk, Ayush will address how PostgreSQL schema changes often trigger costly production outages due to heavy, exclusive table locks. He will break down safe versus high-risk DDL operations and demonstrate how community extensions like pg_repack work under the hood to enable seamless, zero-downtime live migrations at scale.
      </details>

      ![Ayush Shah](/images/speakers/ayush-shah.jpeg)
- time: "02:15 PM - 02:50 PM"
  events:
