      ### SQL Insights - a platform that learns from real PostgreSQL optimization cases and turns that knowledge into actionable recommendations
      **`Speaker:`** [Prafulla Ranadive](/speakers/prafulla-ranadive)
      <details>
        <summary>Talk Details</summary>
        In his upcoming talk, Prafulla will introduce SQLInsights, a platform he created to transform real-world PostgreSQL optimization data into explainable, actionable recommendations. He will explore how AI-augmented systems—which combine LLM frameworks like LangChain and LlamaIndex with deterministic rule engines—can enable the safer and more reliable adoption of NL-to-SQL agents in production environments.
      </details>

